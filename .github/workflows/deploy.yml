name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/SmartPick-frontend
            git checkout -- package-lock.json
            git pull origin main
            git checkout main
            npm install
            npm run build
            pm2 restart smartpick-frontend || pm2 start npm --name smartpick-frontend -- start
            pm2 save